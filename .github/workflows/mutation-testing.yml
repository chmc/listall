          - file: "ListAll/ListAll/Models/ItemImage.swift"
            file_name: "ItemImage"
            test_targets: "ListAllWatch Watch AppTests/WatchSyncChaosTests"
          - file: "ListAll/ListAll/Models/List.swift"
            file_name: "List"
            test_targets: "ListAllWatch Watch AppTests/WatchViewModelErrorHandlingTests,ListAllWatch Watch AppTests/WatchSyncChaosTests"
          # Removed from watchOS matrix (not compiled into watchOS target or no mutable code):
          #   - URLHelper.swift (uses UIApplication.shared, iOS-only API)
          #   - Constants.swift (mutable code in #if blocks excluded on watchOS)
          #   - TooltipManager.swift (same as Constants)
          # Removed from watchOS matrix (no watchOS test coverage — re-add when tests exist):
          #   - String+Extensions.swift
          #   - ValidationHelper.swift
          #   - LocalizationManager.swift (WatchLocalizationTests is #if !os(watchOS))
          # watchOS-specific files
          - file: "ListAllWatch Watch App/ViewModels/WatchListViewModel.swift"
            file_name: "WatchListViewModel"
            test_targets: "ListAllWatch Watch AppTests/WatchViewModelErrorHandlingTests,ListAllWatch Watch AppTests/WatchSyncChaosTests"
          - file: "ListAllWatch Watch App/ViewModels/WatchMainViewModel.swift"
            file_name: "WatchMainViewModel"
            test_targets: "ListAllWatch Watch AppTests/WatchViewModelErrorHandlingTests,ListAllWatch Watch AppTests/WatchSyncChaosTests"
          - file: "ListAllWatch Watch App/Utils/WatchPerformanceManager.swift"
